{{define "content"}}
<header class="pt-6 pb-4">
    <h1 class="text-lg font-bold">Vinnere</h1>
    <p class="text-xs text-gray-400">Daglige vinnere</p>
</header>

{{if eq (len .Winners) 0}}
<div class="flex flex-col items-center justify-center py-20 text-gray-400">
    <svg class="w-16 h-16 mb-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1"
            d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"
        />
    </svg>
    <p class="text-sm">Ingen vinnere ennå</p>
</div>
{{else}}
<div class="space-y-6 pb-4">
    {{range .Winners}}
    <div class="fade-in">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">{{.UploadDate}}</p>
        <div class="rounded-xl overflow-hidden shadow-sm border border-gray-100 bg-white">
            <img
                src="{{.URL}}"
                alt="Vinner av {{.UploadDate}}"
                class="w-full aspect-[4/3] object-cover"
                loading="lazy"
            />
            <div class="p-4 flex items-center justify-between">
                <div>
                    <p class="font-semibold text-sm">{{.UserName}}</p>
                </div>
                <div class="flex items-center gap-1 text-sm text-gray-500">
                    <span>♥</span>
                    <span>{{.LikeCount}}</span>
                </div>
            </div>
        </div>
    </div>
    {{end}}
</div>
{{end}} {{end}}
